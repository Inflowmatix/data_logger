name: Test Data Logger and publish
on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      working-directory: ./data_logger
    steps:
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.19.5'
        otp-version: '27.2'
    - name: Checkout
      uses: actions/checkout@v7
    - name: Setup Hex and Dependencies
      run: |
        mix local.hex --force
        mix local.rebar --force
        mix hex.organization auth inflowmatix --key "$HEX_KEY"
        mix deps.get
      working-directory: /home/runner/work/data_logger/data_logger
      env:
        HEX_KEY: ${{ secrets.HEX_KEY }}
    - name: Test
      run: |
        MIX_ENV=test mix deps.compile
        MIX_ENV=test mix compile
        MIX_ENV=test mix format --check-formatted
        MIX_ENV=test mix test
      working-directory: /home/runner/work/data_logger/data_logger
    - name: Publish to Hex (Inflowmatix org)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        set +e
        output=$(mix hex.publish package --yes 2>&1)
        status=$?
        echo "$output"
        if [ $status -ne 0 ]; then
          if echo "$output" | grep -qiE "has already been published|already released"; then
            echo "::notice::Version already published to Hex, skipping."
            exit 0
          fi
          exit $status
        fi
      working-directory: /home/runner/work/data_logger/data_logger
      env:
        HEX_API_KEY: ${{ secrets.HEX_KEY }}
